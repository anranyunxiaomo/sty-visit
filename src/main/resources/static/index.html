<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>天穹</title>
    <link rel="stylesheet" href="/apple-ui.css" />
    <script src="/lib/vue.js"></script>
    <link rel="stylesheet" href="/lib/xterm.css" />
    <script src="/lib/xterm.js"></script>
    <script src="/lib/xterm-addon-fit.js"></script>
    <script src="/lib/lucide.js"></script>
    <script src="/lib/ace.js"></script>
    <script src="/lib/utils.js"></script>
    <style>
        #hidden-input { position: absolute; opacity: 0; pointer-events: none; z-index: -1; }
        .progress-ring { transform: rotate(-90deg); }
        .progress-ring-circle { transition: stroke-dashoffset 0.6s ease; stroke: var(--color-accent); }
        .snippet-tag { background: var(--color-fill-2); border-radius: var(--radius-xs); padding: 6px 12px; font-size: var(--text-caption1); font-weight: 600; color: var(--color-text-primary); white-space: nowrap; display: inline-flex; align-items: center; position: relative; }
        .bookmark-delete { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: var(--color-red); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; box-shadow: var(--shadow-sm); }
        .snippet-tag:hover .bookmark-delete { display: flex; }
    </style>
</head>
<body class="app-container">

<div id="app" class="h-full flex flex-col">
    <input type="text" id="hidden-input" autocorrect="off" autocapitalize="off">

    <!-- 1. 登录页面 -->
    <div v-if="!isWebLoggedIn" class="main-content items-center justify-center px-6">
        <div class="mb-8 text-center">
            <div style="width:80px;height:80px;background:#000;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-4);">
                <i data-lucide="shield-check" style="width:40px;height:40px;color:#fff;"></i>
            </div>
            <h1 style="font-size:var(--text-title1);font-weight:700;">天穹</h1>
            <p style="color:var(--color-text-secondary);margin-top:var(--sp-1);">系统鉴权，触手可及</p>
        </div>
        <div class="w-full" style="max-width: 320px;">
            <div class="space-y-4">
                <input type="password" v-model="webPwd" @keyup.enter="handleWebLogin" placeholder="管理认证 Key" class="input text-center">
                <button type="button" @click="handleWebLogin" :disabled="loading" class="btn btn-primary w-full" style="box-shadow:var(--shadow-sm);">
                    {{ loading ? '校验中...' : '进入系统' }}
                </button>
            </div>
        </div>
    </div>

    <!-- 2. SSH 引导/书签广场 -->
    <div v-else-if="!isSshLoggedIn" class="main-content px-6 py-10">
        <!-- 书签广场视图 -->
        <div v-if="!showConnectionForm" class="w-full max-w-lg mx-auto">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 style="font-size:var(--text-title1);font-weight:700;">会话管理器</h2>
                    <p style="color:var(--color-text-secondary);margin-top:2px;">选择或创建一个新的 SSH 会话</p>
                </div>
                <button @click="showConnectionForm = true; sshHost=''; sshUser='root'; sshPwd=''" class="btn btn-primary" style="height:40px;padding:0 20px;border-radius:var(--radius-full);font-size:14px;">
                    <i data-lucide="plus" style="width:16px;height:16px;margin-right:4px;"></i> 新建连接
                </button>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div v-for="b in bookmarks" :key="b.id" @click="useBookmark(b); handleSshLogin()" class="card relative flex flex-col cursor-pointer hover:border-accent group transition-all" style="padding:var(--sp-4);background:var(--color-bg-card);">
                    <div class="flex items-start justify-between mb-3">
                        <div style="width:40px;height:40px;background:var(--color-accent-light);color:var(--color-accent);border-radius:12px;display:flex;align-items:center;justify-content:center;">
                            <i data-lucide="terminal" style="width:20px;height:20px;"></i>
                        </div>
                        <div class="flex space-x-1">
                            <button @click.stop="useBookmark(b); showConnectionForm = true" class="p-2 text-tertiary hover:text-accent"><i data-lucide="edit-3" style="width:14px;height:14px;"></i></button>
                            <button @click.stop="deleteBookmark(b.id)" class="p-2 text-tertiary hover:text-red"><i data-lucide="trash-2" style="width:14px;height:14px;"></i></button>
                        </div>
                    </div>
                    <span style="font-size:16px;font-weight:600;color:var(--color-text-primary);" class="truncate">{{ b.name }}</span>
                    <span style="font-size:12px;color:var(--color-text-tertiary);" class="truncate">{{ b.user }}@{{ b.host }}:{{ b.port }}</span>
                </div>
                
                <div v-if="bookmarks.length === 0" @click="showConnectionForm = true" class="card-inset border-dashed flex flex-col items-center justify-center py-12 cursor-pointer" style="border:2px dashed var(--color-separator);background:none;">
                    <i data-lucide="plus-circle" style="width:32px;height:32px;color:var(--color-text-tertiary);margin-bottom:8px;"></i>
                    <p style="color:var(--color-text-tertiary);font-weight:600;">添加首个服务器书签</p>
                </div>
            </div>

            <div class="mt-12 text-center">
                <button type="button" @click="isWebLoggedIn = false; localStorage.removeItem('visit_token')" style="color:var(--color-text-tertiary);font-size:var(--text-footnote);background:none;border:none;text-decoration:underline;">注销管理系统</button>
            </div>
        </div>

        <!-- 新建/编辑连接表单 -->
        <div v-else class="card w-full max-w-md mx-auto" style="padding: var(--sp-6);">
            <div class="flex items-center mb-6">
                <button @click="showConnectionForm = false" class="mr-4 text-secondary"><i data-lucide="arrow-left" style="width:24px;height:24px;"></i></button>
                <h2 style="font-size:var(--text-title2);font-weight:600;">会话属性</h2>
            </div>
            
            <div class="space-y-4">
                <div class="flex space-x-3">
                    <div class="flex-1">
                        <label style="font-size:12px;color:var(--color-text-tertiary);font-weight:600;display:block;margin-bottom:4px;">主机地址</label>
                        <input type="text" v-model="sshHost" placeholder="127.0.0.1" class="input">
                    </div>
                    <div style="width:90px;">
                        <label style="font-size:12px;color:var(--color-text-tertiary);font-weight:600;display:block;margin-bottom:4px;">端口</label>
                        <input type="text" v-model="sshPort" placeholder="22" class="input text-center">
                    </div>
                </div>
                <div>
                    <label style="font-size:12px;color:var(--color-text-tertiary);font-weight:600;display:block;margin-bottom:4px;">登录用户</label>
                    <input type="text" v-model="sshUser" placeholder="root" class="input">
                </div>
                <div>
                    <label style="font-size:12px;color:var(--color-text-tertiary);font-weight:600;display:block;margin-bottom:4px;">身份凭据</label>
                    <textarea v-model="sshPwd" placeholder="密码或私钥内容..." class="input" style="resize:none;height:100px;font-family:monospace;font-size:12px;"></textarea>
                    <div class="flex justify-between items-center mt-2">
                        <label class="flex items-center">
                            <input type="checkbox" v-model="isKeyAuth" style="margin-right:8px;">
                            <span style="font-size:13px;color:var(--color-text-secondary);">使用 SSH 密钥</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" v-model="shouldSaveBookmark" style="margin-right:8px;">
                            <span style="font-size:13px;color:var(--color-accent);font-weight:600;">保存书签</span>
                        </label>
                    </div>
                </div>
                
                <div v-if="shouldSaveBookmark" class="animate-in slide-in-from-top-2">
                    <label style="font-size:12px;color:var(--color-text-tertiary);font-weight:600;display:block;margin-bottom:4px;">书签名称</label>
                    <input type="text" v-model="bookmarkName" placeholder="例如：生产数据库" class="input">
                </div>

                <div class="flex space-x-3 mt-6">
                    <button type="button" @click="showConnectionForm = false" class="btn flex-1" style="background:var(--color-fill-2);color:var(--color-text-primary);">取消</button>
                    <button type="button" @click="handleSshLogin" class="btn btn-primary flex-1" :disabled="loading">
                        {{ loading ? '连接中...' : '立即连接' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 工作区 -->
    <template v-else>
        <div class="nav-bar justify-between">
            <div class="flex flex-col flex-1 overflow-hidden">
                <div class="flex items-center space-x-2">
                    <span style="font-size:9px;font-weight:700;color:var(--color-text-tertiary);">会话目标</span>
                </div>
                <span style="font-size:var(--text-headline);font-weight:600;" class="truncate">{{ sshUser }}@{{ sshHost }}</span>
            </div>
            
            <div class="flex items-center space-x-2">
                <button type="button" @click="handleLogout" style="width:32px;height:32px;border-radius:50%;background:var(--color-fill-2);display:flex;align-items:center;justify-content:center;color:var(--color-red);">
                    <i data-lucide="power" style="width:16px;height:16px;"></i>
                </button>
            </div>
        </div>

        <div class="main-content">
            <!-- 终端视图 -->
            <div v-show="currentTab === 'terminal'" class="flex-1 flex flex-col overflow-hidden relative">
                <div style="padding:var(--sp-2) var(--sp-4);display:flex;align-items:center;gap:var(--sp-2);background:var(--color-bg-card);border-bottom:0.5px solid var(--color-separator);">
                    <div class="flex-1 flex gap-2 overflow-x-auto no-scrollbar">
                        <div v-for="s in snippets" :key="s.name" @click="executeSnippet(s.command)" class="snippet-tag cursor-pointer hover:bg-accent-light hover:text-accent transition-colors">
                            {{ s.name }}
                        </div>
                    </div>
                    <div style="width:1px;height:20px;background:var(--color-separator);margin:0 4px;"></div>
                    <button @click="syncTermToFiles" class="flex items-center gap-1 text-accent font-bold" style="font-size:10px;white-space:nowrap;">
                        <i data-lucide="refresh-cw" style="width:12px;height:12px;"></i> 同步至文件
                    </button>
                </div>

                <div class="terminal-container relative" ref="terminalEl">
                    <div v-if="isWsDisconnected" class="absolute flex-col items-center justify-center" style="inset:0;background:rgba(0,0,0,0.6);z-index:20;display:flex;">
                        <i data-lucide="wifi-off" style="color:rgba(255,255,255,0.5);width:40px;height:40px;margin-bottom:12px;"></i>
                        <span style="color:white;font-weight:600;">链路中断重试中...</span>
                    </div>
                </div>
                
                <div style="padding:var(--sp-2) var(--sp-4);display:flex;gap:var(--sp-2);overflow-x:auto;" class="no-scrollbar">
                    <button type="button" @click="focusTerminal" style="height:36px;padding:0 var(--sp-3);border-radius:var(--radius-sm);background:var(--color-accent-light);color:var(--color-accent);font-weight:600;font-size:var(--text-caption1);display:flex;align-items:center;gap:4px;flex-shrink:0;">
                        <i data-lucide="keyboard" style="width:16px;height:16px;"></i> 聚焦终端
                    </button>
                    <div style="width:1px;background:var(--color-separator);flex-shrink:0;"></div>
                    <button type="button" v-for="key in coreShortcuts" :key="key.label" @click="sendKey(key.val)" style="height:36px;padding:0 var(--sp-3);border-radius:var(--radius-sm);background:var(--color-bg-card);font-weight:600;font-size:var(--text-caption1);box-shadow:var(--shadow-xs);flex-shrink:0;">
                        {{ key.label }}
                    </button>
                </div>
            </div>

            <!-- 文件管理视图 -->
            <div v-show="currentTab === 'files'" class="flex-1 flex flex-col bg-transparent overflow-hidden relative">
                <div style="padding:var(--sp-2) var(--sp-4);display:flex;align-items:center;gap:var(--sp-3);background:var(--glass-bg);backdrop-filter:blur(10px);border-bottom:0.5px solid var(--color-separator);">
                    <div class="flex-1 flex items-center" style="background:var(--color-fill-3);border-radius:var(--radius-sm);padding:6px 12px;">
                        <i data-lucide="folder" style="width:14px;height:14px;color:var(--color-accent);margin-right:8px;flex-shrink:0;"></i>
                        <input type="text" v-model="inputPath" @keyup.enter.stop.prevent="jumpToPath" class="w-full" style="background:none;border:none;outline:none;font-size:13px;font-weight:600;color:var(--color-text-primary);" placeholder="输入路径跳转">
                    </div>
                    <div class="flex items-center space-x-2">
                        <button type="button" @click="syncFilesToTerm" class="text-accent font-bold" style="font-size:10px;">跟随终端</button>
                        <button type="button" @click="syncPathToTerm" style="color:var(--color-text-secondary);font-size:10px;font-weight:700;">下发路径</button>
                        <label class="cursor-pointer" style="width:28px;height:28px;border-radius:var(--radius-sm);background:rgba(0,122,255,0.1);color:var(--color-accent);display:flex;align-items:center;justify-content:center;">
                            <i data-lucide="upload" style="width:14px;height:14px;"></i>
                            <input type="file" @change="uploadFile" style="display:none;">
                        </label>
                        <button type="button" @click="goUp" v-if="currentPath !== '/'" style="width:28px;height:28px;border-radius:var(--radius-sm);background:var(--color-fill-2);display:flex;align-items:center;justify-content:center;">
                            <i data-lucide="arrow-up" style="width:14px;height:14px;"></i>
                        </button>
                    </div>
                </div>
                
                <div class="list flex-1 overflow-y-auto" style="border-radius:0;background:transparent;box-shadow:none;">
                    <div v-for="f in fileList" :key="f.path" @click="handleFileClick(f)" class="list-row" style="background:var(--color-bg-card);margin:8px 16px;border-radius:var(--radius-md);border-bottom:none;box-shadow:var(--shadow-xs);">
                        <input type="checkbox" v-model="selectedPaths" :value="f.path" @click.stop style="width:18px;height:18px;margin-right:4px;">
                        <div class="list-row-icon" :style="f.dir ? 'background:var(--color-accent-light);color:var(--color-accent);' : 'background:var(--color-fill-2);color:var(--color-text-secondary);'">
                            <i :data-lucide="f.dir ? 'folder' : 'file-text'" style="width:16px;height:16px;"></i>
                        </div>
                        <div class="list-row-label flex flex-col truncate" style="line-height:1.2;">
                            <span style="font-weight:600;font-size:15px;" class="truncate">{{ f.name }}</span>
                            <span style="font-size:11px;color:var(--color-text-tertiary);">{{ f.updateTime }} · {{ f.dir ? '目录' : formatSize(f.size) }}</span>
                        </div>
                        <button type="button" @click.stop="openMenu(f)" style="color:var(--color-text-tertiary);padding:4px;"><i data-lucide="more-horizontal" style="width:20px;height:20px;"></i></button>
                    </div>
                    <div v-if="fileList.length === 0" class="flex flex-col items-center justify-center py-20" style="opacity:0.4;">
                        <i data-lucide="inbox" style="width:40px;height:40px;margin-bottom:12px;"></i>
                        <p style="font-weight:600;">暂无内容</p>
                    </div>
                    <div style="height: 100px;"></div>
                </div>
            </div>

            <!-- 传输记录视图 -->
            <div v-show="currentTab === 'transfer'" class="flex-1 flex flex-col bg-transparent overflow-hidden relative">
                <div style="padding:calc(var(--sp-3) + env(safe-area-inset-top, 0px)) var(--sp-4) var(--sp-3);display:flex;justify-content:space-between;align-items:center;background:var(--glass-bg);backdrop-filter:blur(10px);border-bottom:0.5px solid var(--color-separator);">
                    <h2 style="font-size:18px;font-weight:700;color:var(--color-text-primary);">传输任务</h2>
                    <button @click="clearTransfers" style="color:var(--color-accent);font-size:14px;font-weight:600;">清空已完成</button>
                </div>
                <div class="list flex-1 overflow-y-auto" style="border-radius:0;background:transparent;box-shadow:none;">
                    <div v-for="t in transferList" :key="t.id" class="list-row" style="background:var(--color-bg-card);margin:8px 16px;border-radius:var(--radius-md);border-bottom:none;box-shadow:var(--shadow-xs);display:flex;align-items:center;padding:12px 16px;">
                        <div class="list-row-icon" :style="t.type === 'UPLOAD' ? 'background:rgba(52,199,89,0.1);color:var(--color-success);' : 'background:rgba(0,122,255,0.1);color:var(--color-accent);'">
                            <i :data-lucide="t.type === 'UPLOAD' ? 'upload' : 'download'" style="width:20px;height:20px;"></i>
                        </div>
                        <div class="flex-1 overflow-hidden" style="margin-left:12px;">
                            <div class="flex justify-between items-center" style="margin-bottom:4px;">
                                <span style="font-weight:600;font-size:14px;color:var(--color-text-primary);" class="truncate">{{ t.name }}</span>
                                <span :style="t.status === 'COMPLETED' ? 'color:var(--color-success);' : (t.status === 'ERROR' ? 'color:var(--color-danger);' : 'color:var(--color-text-secondary);')" style="font-size:12px;font-weight:600;flex-shrink:0;margin-left:8px;">
                                    {{ t.status === 'COMPLETED' ? '成功' : (t.status === 'ERROR' ? '失败' : (t.progress + '%')) }}
                                </span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span style="font-size:11px;color:var(--color-text-tertiary);" class="truncate">{{ t.targetPath }}</span>
                                <span style="font-size:11px;color:var(--color-text-tertiary);flex-shrink:0;margin-left:8px;">{{ t.timestamp }}</span>
                            </div>
                            <div v-if="t.status === 'UPLOADING' || t.status === 'DOWNLOADING'" style="height:2px;background:var(--color-fill-2);border-radius:1px;margin-top:6px;overflow:hidden;">
                                <div :style="{ width: t.progress + '%', background: 'var(--color-accent)', height: '100%' }"></div>
                            </div>
                        </div>
                    </div>
                    <div v-if="transferList.length === 0" class="flex flex-col items-center justify-center py-20" style="opacity:0.4;">
                        <i data-lucide="inbox" style="width:40px;height:40px;margin-bottom:12px;"></i>
                        <p style="font-weight:600;">暂无传输任务</p>
                    </div>
                    <div style="height: 100px;"></div>
                </div>
            </div>

            <!-- 性能仪表盘 -->
            <div v-show="currentTab === 'monitor'" class="flex-1 overflow-y-auto px-6 py-4 pb-24 space-y-4">
                <div class="flex gap-4">
                    <div class="card flex-1 flex flex-col items-center text-center">
                        <span style="font-size:10px;font-weight:700;color:var(--color-text-tertiary);margin-bottom:16px;">计算负载 (CPU)</span>
                        <svg class="progress-ring" width="80" height="80">
                            <circle style="color:var(--color-fill-2);" stroke-width="6" stroke="currentColor" fill="transparent" r="32" cx="40" cy="40"/>
                            <circle class="progress-ring-circle" stroke-width="6" :stroke-dasharray="2 * Math.PI * 32" :stroke-dashoffset="2 * Math.PI * 32 * (1 - (monitor.cpu||0)/100)" stroke-linecap="round" fill="transparent" r="32" cx="40" cy="40"/>
                        </svg>
                        <span style="font-size:20px;font-weight:800;margin-top:12px;">{{(monitor.cpu||0).toFixed(0)}}%</span>
                    </div>
                    <div class="card flex-1 flex flex-col items-center text-center">
                        <span style="font-size:10px;font-weight:700;color:var(--color-text-tertiary);margin-bottom:16px;">内存使用 (MEM)</span>
                        <svg class="progress-ring" width="80" height="80">
                            <circle style="color:var(--color-fill-2);" stroke-width="6" stroke="currentColor" fill="transparent" r="32" cx="40" cy="40"/>
                            <circle class="progress-ring-circle" stroke-width="6" :stroke-dasharray="2 * Math.PI * 32" :stroke-dashoffset="2 * Math.PI * 32 * (1 - (monitor.mem||0)/100)" stroke-linecap="round" fill="transparent" r="32" cx="40" cy="40" style="stroke:var(--color-purple);"/>
                        </svg>
                        <span style="font-size:20px;font-weight:800;margin-top:12px;">{{(monitor.mem||0).toFixed(0)}}%</span>
                    </div>
                </div>

                <div class="card">
                    <h3 style="font-size:11px;font-weight:700;color:var(--color-text-secondary);margin-bottom:16px;">资源明细</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span style="font-size:var(--text-sub);color:var(--color-text-secondary);">开机时长</span>
                            <span style="font-weight:600;">{{monitor.uptime || '---'}}</span>
                        </div>
                        <div class="space-y-3" style="padding-top:16px;border-top:0.5px solid var(--color-separator);">
                            <div v-for="d in (monitor.disks || [])" :key="d.mount" class="flex flex-col space-y-1">
                                <div class="flex justify-between" style="font-size:10px;font-weight:700;">
                                    <span style="color:var(--color-text-tertiary);">{{d.mount}}</span>
                                    <span>{{d.usage}}%</span>
                                </div>
                                <div style="height:6px;width:100%;background:var(--color-fill-2);border-radius:3px;overflow:hidden;">
                                    <div :style="{width: d.usage + '%'}" style="height:100%;background:var(--color-text-primary);border-radius:3px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 审计日志 -->
            <div v-show="currentTab === 'audit'" class="flex-1 flex flex-col overflow-hidden">
                <div class="flex-1 overflow-y-auto px-6 py-4 pb-24">
                    <div v-for="log in auditLogs" :key="log.timestamp + log.ip" class="log-card">
                        <div class="log-header">
                            <span class="badge" :class="log.status.includes('成功') ? 'badge-green' : 'badge-red'">{{ log.status }}</span>
                            <span class="log-time">{{ log.timestamp }}</span>
                        </div>
                        <div class="log-title">{{ log.action }}</div>
                        <div class="log-detail">{{ log.ip }} · {{ log.detail }}</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-bar">
            <button type="button" @click="currentTab = 'monitor'" class="tab-item" :class="{'is-active': currentTab === 'monitor'}">
                <i data-lucide="bar-chart-2" style="width:24px;height:24px;"></i>
                <span>看板</span>
            </button>
            <button type="button" @click="currentTab = 'terminal'" class="tab-item" :class="{'is-active': currentTab === 'terminal'}">
                <i data-lucide="terminal" style="width:24px;height:24px;"></i>
                <span>终端</span>
            </button>
            <button type="button" @click="currentTab = 'files'" class="tab-item" :class="{'is-active': currentTab === 'files'}">
                <i data-lucide="folder" style="width:24px;height:24px;"></i>
                <span>文件</span>
            </button>
            <button type="button" @click="currentTab = 'transfer'" class="tab-item" :class="{'is-active': currentTab === 'transfer'}">
                <i data-lucide="download-cloud" style="width:24px;height:24px;"></i>
                <span>传输</span>
            </button>
            <button type="button" @click="currentTab = 'audit'" class="tab-item" :class="{'is-active': currentTab === 'audit'}">
                <i data-lucide="activity" style="width:24px;height:24px;"></i>
                <span>审计</span>
            </button>
        </div>
        
        <!-- 批量操作层 -->
        <div v-if="selectedPaths.length > 0" class="card-glass flex items-center space-x-4" style="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:200;padding:12px 24px;border-radius:var(--radius-full);">
            <span style="font-size:var(--text-sub);font-weight:600;">已选择 {{ selectedPaths.length }} 项</span>
            <button @click="handleBatchDelete" style="color:var(--color-red);font-weight:600;font-size:var(--text-sub);">销毁</button>
            <button @click="selectedPaths = []" style="color:var(--color-text-secondary);font-weight:600;font-size:var(--text-sub);">取消</button>
        </div>
    </template>

    <!-- 动作菜单 -->
    <div v-if="activeFile" @click="activeFile = null" class="sheet-overlay flex items-end">
        <div @click.stop class="sheet">
            <div class="sheet-handle"></div>
            <div style="margin-bottom:var(--sp-6);">
                <p style="font-size:var(--text-title3);font-weight:700;" class="truncate">{{ activeFile.name }}</p>
                <p style="font-size:var(--text-caption1);color:var(--color-text-secondary);" class="truncate">{{ activeFile.path }}</p>
            </div>
            <div class="list" style="margin-bottom:var(--sp-4);">
                <div v-if="!activeFile.dir && isEditable(activeFile.name)" @click="openEditor(activeFile)" class="list-row" style="padding:16px;">
                    <i data-lucide="edit-3" style="width:20px;height:20px;color:var(--color-accent);margin-right:12px;"></i>
                    <span style="font-weight:600;">修改代码/内容</span>
                </div>
                <div v-if="!activeFile.dir" @click="downloadFile(activeFile)" class="list-row" style="padding:16px;">
                    <i data-lucide="download-cloud" style="width:20px;height:20px;color:var(--color-accent);margin-right:12px;"></i>
                    <span style="font-weight:600;">提取文件</span>
                </div>
                <div @click="renameFile(activeFile)" class="list-row" style="padding:16px;">
                    <i data-lucide="type" style="width:20px;height:20px;color:var(--color-text-tertiary);margin-right:12px;"></i>
                    <span style="font-weight:600;">重命名</span>
                </div>
                <div @click="confirmDelete(activeFile)" class="list-row" style="padding:16px;">
                    <i data-lucide="trash-2" style="width:20px;height:20px;color:var(--color-red);margin-right:12px;"></i>
                    <span style="font-weight:600;color:var(--color-red);">安全粉碎</span>
                </div>
            </div>
            <button type="button" @click="activeFile = null" class="btn w-full" style="background:var(--color-bg-card);color:var(--color-accent);font-size:var(--text-headline);">撤销</button>
        </div>
    </div>
    
    <!-- 编辑器 -->
    <div v-show="editingFile" style="position:fixed;inset:0;background:var(--color-bg-base);z-index:250;display:flex;flex-direction:column;animation:apple-slide-up var(--t-base) var(--ease-spring);">
        <div style="padding:calc(var(--sp-3) + env(safe-area-inset-top, 0px)) var(--sp-5) var(--sp-3);display:flex;justify-content:space-between;align-items:center;background:var(--color-bg-card);border-bottom:0.5px solid var(--color-separator);">
            <div class="flex flex-col truncate" style="max-width:60%;">
                <span style="font-size:var(--text-sub);font-weight:600;" class="truncate">{{ editingFile?.name }}</span>
                <span style="font-size:10px;color:var(--color-text-secondary);" class="truncate">{{ editingFile?.path }}</span>
            </div>
            <div class="flex space-x-4">
                <button type="button" @click="saveFile" :disabled="saving" style="color:var(--color-accent);font-weight:600;">{{ saving ? '应用中...' : '提交修改' }}</button>
                <button type="button" @click="closeEditor" style="color:var(--color-text-secondary);font-weight:600;">退出</button>
            </div>
        </div>
        <div id="ace-editor" class="flex-1"></div>
    </div>
</div>

<script>
const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

createApp({
    setup() {
        const isWebLoggedIn = ref(!!localStorage.getItem('visit_token'));
        const webPwd = ref('');
        const isSshLoggedIn = ref(!!sessionStorage.getItem('ssh_host_active'));
        const sshHost = ref(localStorage.getItem('ssh_conf_host') || '127.0.0.1');
        const sshPort = ref(localStorage.getItem('ssh_conf_port') || '22');
        const sshUser = ref(localStorage.getItem('ssh_conf_user') || 'root');
        const sshPwd = ref('');
        const loading = ref(false);
        const currentTab = ref('terminal');
        const auditLogs = ref([]);
        const currentPath = ref('.');
        const fileList = ref([]);
        const transferList = ref([]);
        const selectedPaths = ref([]);
        const activeFile = ref(null);
        const editingFile = ref(null);
        const saving = ref(false);
        const monitor = ref({ cpu: 0, mem: 0, load: 0, latency: '--' });
        const isKeyAuth = ref(false);
        const bookmarks = ref([]);
        const shouldSaveBookmark = ref(false);
        const bookmarkName = ref('');
        const terminalEl = ref(null);
        const inputPath = ref('.');
        const isWsDisconnected = ref(false);
        const showConnectionForm = ref(false);
        let term, socket, fitAddon, aceEditor, monitorTimer, reconnectTimer;

        const coreShortcuts = [
            {label:'Tab',val:'\t'}, {label:'ESC',val:'\x1b'}, 
            {label:'Ctrl+C',val:'\x03'}, {label:'Enter',val:'\r'}
        ];

        const formatTime = (date) => {
            const pad = (n) => n.toString().padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
        };

        const refreshIcons = () => {
            nextTick(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });
        };

        const focusTerminal = () => {
            if (term) {
                term.focus();
                const input = document.getElementById('hidden-input');
                if (input) {
                    input.focus();
                    setTimeout(() => term.focus(), 10);
                }
            }
        };

        const protectPwd = (pwd) => VisitUtils.protectPwd(pwd, localStorage.getItem('visit_session_key'));
        const revealPwd = (protectedStr) => VisitUtils.revealPwd(protectedStr, localStorage.getItem('visit_session_key'));

        const handleWebLogin = async () => {
            if (!webPwd.value || loading.value) return;
            loading.value = true;
            try {
                const res = await fetch('/api/auth/login', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: webPwd.value })
                });
                
                if (res.ok) {
                    const body = await res.json();
                    const data = body.data || {};
                    localStorage.setItem('visit_token', data.token);
                    localStorage.setItem('visit_session_key', data.sessionKey);
                    isWebLoggedIn.value = true;
                    refreshIcons();
                    await fetchBookmarks();
                } else {
                    const errorMsg = await res.text();
                    alert('认证未通过: ' + (errorMsg || '密码校验失败'));
                }
             } catch (e) { 
                 alert('网络异常: 无法连接至管理服务端'); 
             } finally {
                 loading.value = false;
             }
        };

        const snippets = ref([]);
        const fetchSnippets = async () => {
            const res = await apiFetch('/api/snippets');
            if (res.ok) {
                const body = await res.json();
                snippets.value = body.data || [];
            }
        };

        const executeSnippet = (cmd) => {
            socket?.send(cmd + '\n');
        };

        const fetchBookmarks = async () => {
            const res = await apiFetch('/api/bookmarks');
            if (res.ok) {
                const body = await res.json();
                bookmarks.value = body.data || [];
            }
        };

        const useBookmark = async (b) => {
            sshHost.value = b.host;
            sshPort.value = b.port;
            sshUser.value = b.user;
            const encryptedStr = b.isKeyAuth ? b.key : b.pwd;
            if (encryptedStr && encryptedStr.startsWith('PROTECTED:AES:')) {
                sshPwd.value = await revealPwd(encryptedStr.substring(14));
            } else {
                sshPwd.value = encryptedStr;
            }
            isKeyAuth.value = b.isKeyAuth;
            shouldSaveBookmark.value = false;
            showConnectionForm.value = true;
        };

        const deleteBookmark = async (id) => {
            if (confirm('确定删除该书签吗？')) {
                const res = await apiFetch(`/api/bookmarks?id=${id}`, { method: 'DELETE' });
                if (res.ok) fetchBookmarks();
            }
        };

        const handleSshLogin = async () => {
            if (!sshPwd.value && !sessionStorage.getItem('ssh_pwd')) return;
            loading.value = true;
            if (sshPwd.value) {
                const protectedPwd = await protectPwd(sshPwd.value);
                sessionStorage.setItem('ssh_pwd', protectedPwd);
            }
            localStorage.setItem('ssh_conf_host', sshHost.value);
            localStorage.setItem('ssh_conf_port', sshPort.value);
            localStorage.setItem('ssh_conf_user', sshUser.value);
            sessionStorage.setItem('ssh_host_active', 'true');
            sessionStorage.setItem('ssh_host', sshHost.value);
            sessionStorage.setItem('ssh_port', sshPort.value);
            sessionStorage.setItem('ssh_user', sshUser.value);
            sessionStorage.setItem('ssh_is_key', isKeyAuth.value ? 'true' : 'false');

            if (shouldSaveBookmark.value) {
                const protectedPwd = !isKeyAuth.value ? await protectPwd(sshPwd.value) : null;
                const protectedKey = isKeyAuth.value ? await protectPwd(sshPwd.value) : null;
                
                await apiFetch('/api/bookmarks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: bookmarkName.value || `${sshUser.value}@${sshHost.value}`,
                        host: sshHost.value,
                        port: sshPort.value,
                        user: sshUser.value,
                        pwd: protectedPwd,
                        key: protectedKey,
                        isKeyAuth: isKeyAuth.value
                    })
                });
                await fetchBookmarks();
            }

            isSshLoggedIn.value = true;
            showConnectionForm.value = false;
            loading.value = false;
            initTerminal();
            fetchFiles();
            fetchSnippets();
            fetchTransfers();
            startMonitoring();
        };

        const apiFetch = async (url, options = {}) => {
            const currentToken = localStorage.getItem('visit_token');
            const pwdProtected = sessionStorage.getItem('ssh_pwd');
            const isKey = sessionStorage.getItem('ssh_is_key') === 'true';
            
            const protectedHeader = pwdProtected && !pwdProtected.startsWith('PROTECTED:AES:') && pwdProtected.includes(':') 
                ? 'PROTECTED:AES:' + pwdProtected 
                : pwdProtected;

            const headers = {
                'Authorization': `Bearer ${currentToken}`,
                'X-Visit-Client': 'H5',
                'X-SSH-Host': sshHost.value,
                'X-SSH-Port': sshPort.value,
                'X-SSH-User': sshUser.value,
                'X-SSH-Pwd': !isKey ? protectedHeader : null,
                'X-SSH-Key': isKey ? protectedHeader : null,
                ...options.headers
            };
            try {
                const res = await fetch(url, { ...options, headers });
                if (res.status === 401) { 
                    handleLogout(); 
                    return new Promise(() => {}); 
                }
                if (res.status === 403) {
                    const errorData = await res.json().catch(() => ({}));
                    alert(errorData.message || '访问受限：无权执行此操作');
                    throw new Error('Forbidden');
                }
                return res;
            } catch (e) { throw e; }
        };

        const handleLogout = async () => {
            if (monitorTimer) clearInterval(monitorTimer);
            if (socket) socket.close();
            try {
                await apiFetch('/api/auth/logout', { method: 'POST' });
            } catch (e) {}
            if (window.AndroidBridge && window.AndroidBridge.hardLogout) {
                window.AndroidBridge.hardLogout();
            }
            sessionStorage.clear();
            localStorage.removeItem('visit_token');
            localStorage.removeItem('visit_session_key');
            auditLogs.value = [];
            window.location.reload();
        };

        const startMonitoring = () => {
            const pull = async () => {
                const start = Date.now();
                try {
                    const res = await apiFetch('/api/monitor/stats');
                    if (res.ok) {
                        const body = await res.json();
                        const data = body.data || {};
                        data.latency = Date.now() - start;
                        monitor.value = data;
                    }
                } catch (e) {}
            };
            pull();
            monitorTimer = setInterval(pull, 3000);
        };

        const initTerminal = () => {
            nextTick(async () => {
                if (!terminalEl.value) return;
                term = new Terminal({ 
                    cursorBlink: true, 
                    fontSize: 13,
                    fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace',
                    theme: { background: '#000', foreground: '#FFF' } 
                });
                fitAddon = new FitAddon.FitAddon();
                term.loadAddon(fitAddon);
                term.options.scrollback = 5000;
                term.open(terminalEl.value);
                fitAddon.fit();
                term.focus();

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                socket = new WebSocket(`${protocol}//${location.host}/ws/terminal`, ['visit-auth.' + localStorage.getItem('visit_token')]);
                socket.binaryType = 'arraybuffer';
                
                const pwdRaw = await revealPwd(sessionStorage.getItem('ssh_pwd'));
                socket.onopen = () => {
                    isWsDisconnected.value = false;
                    if (reconnectTimer) clearTimeout(reconnectTimer);
                    socket.send(JSON.stringify({
                        type: 'auth',
                        sshHost: sshHost.value,
                        sshPort: sshPort.value,
                        sshUser: sshUser.value,
                        sshPwd: btoa(pwdRaw),
                        cols: term.cols, rows: term.rows
                    }));
                };
                socket.onmessage = (ev) => {
                    if (ev.data instanceof ArrayBuffer) term.write(new Uint8Array(ev.data));
                    else term.write(ev.data);
                };
                socket.onclose = () => {
                    isWsDisconnected.value = true;
                    if (reconnectTimer) clearTimeout(reconnectTimer);
                    reconnectTimer = setTimeout(() => {
                        console.log("Reconnecting WebSocket...");
                        initTerminal();
                    }, 5000);
                };
                socket.onerror = () => { socket.close(); };

                term.onData(data => socket?.readyState === 1 && socket.send(data));
                window.addEventListener('resize', () => {
                    fitAddon.fit();
                    if (socket && socket.readyState === 1) {
                        socket.send(JSON.stringify({
                            type: 'resize',
                            cols: term.cols,
                            rows: term.rows
                        }));
                    }
                });
                terminalEl.value.addEventListener('click', () => term.focus());

                window.visitBridge = {
                    send: (cmd) => {
                        if (socket && socket.readyState === 1) {
                            socket.send(cmd);
                        }
                    }
                };
            });
        };

        const syncPathToTerm = () => {
            if (socket && socket.readyState === 1) {
                socket.send(`cd "${currentPath.value}"\r`);
                currentTab.value = 'terminal';
            }
        };

        const syncTermToFiles = () => {
            socket?.send('pwd\r');
            alert('请在终端查看当前路径后，在文件管理器中输入跳转。后续版本将支持自动解析 PS1。');
        };

        const syncFilesToTerm = async () => {
            try {
                const res = await apiFetch('/api/file/pwd');
                if (res.ok) {
                    const body = await res.json();
                    const path = body.data?.path;
                    if (path) fetchFiles(path);
                }
            } catch (e) {
                alert('获取终端路径失败，请手动同步。');
            }
        };

        const jumpToPath = () => {
            const path = inputPath.value.trim();
            if (path) fetchFiles(path);
        };

        const fetchFiles = async (path = currentPath.value) => {
            selectedPaths.value = [];
            try {
                const res = await apiFetch(`/api/file/list?path=${encodeURIComponent(path)}`);
                if (res.ok) { 
                    const body = await res.json();
                    fileList.value = body.data || []; 
                    currentPath.value = path; 
                    inputPath.value = path; 
                    refreshIcons(); 
                } else {
                    alert('无法进入该目录，请检查路径是否正确');
                    inputPath.value = currentPath.value;
                }
            } catch (e) {
                console.error('List error:', e);
            }
        };

        const handleFileClick = (f) => f.dir ? fetchFiles(f.path) : (activeFile.value = f, refreshIcons());
        const goUp = () => fetchFiles(currentPath.value.substring(0, currentPath.value.lastIndexOf('/')) || '/');
        
        const formatSize = (b) => VisitUtils.formatSize(b);
        
        const isEditable = (n) => /\.(sh|conf|txt|yml|yaml|json|py|js|html|css|php|xml|md)$/i.test(n);

        const fetchAuditLogs = async () => {
            const res = await apiFetch('/api/audit/logs');
            if (res.ok) { 
                const body = await res.json();
                auditLogs.value = body.data || []; 
                refreshIcons(); 
            }
        };

        const getAuditTagClass = (s) => s.includes('成功') ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600';

        const openEditor = async (f) => {
            activeFile.value = null; editingFile.value = f;
            try {
                const res = await apiFetch(`/api/file/content?path=${encodeURIComponent(f.path)}`);
                const body = await res.json();
                const content = body.data || '';
                nextTick(() => {
                    aceEditor = ace.edit("ace-editor");
                    aceEditor.setTheme("ace/theme/chrome");
                    aceEditor.setValue(content, -1);
                });
            } catch (e) { alert('读取失败'); }
        };

        const saveFile = async () => {
            saving.value = true;
            try {
                await apiFetch('/api/file/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: editingFile.value.path, content: aceEditor.getValue() })
                });
                alert('已保存');
            } catch (e) { alert('保存失败'); }
            saving.value = false;
        };

        const fetchTransfers = async () => {
            try {
                const res = await apiFetch('/api/transfers');
                if (res.ok) {
                    const result = await res.json();
                    transferList.value = result.data || [];
                }
            } catch (e) {}
        };

        const clearTransfers = async () => {
            if (!confirm('确定清空所有传输记录吗？')) return;
            try {
                const res = await apiFetch('/api/transfers', { method: 'DELETE' });
                if (res.ok) {
                    transferList.value = [];
                    alert('已清空');
                }
            } catch (e) {}
        };

        const uploadFile = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const id = 'h5_' + Date.now();
            const transfer = { id, name: file.name, type: 'UPLOAD', status: 'UPLOADING', progress: 0, targetPath: currentPath.value, errorMessage: '', timestamp: formatTime(new Date()) };
            transferList.value.unshift(transfer);
            apiFetch('/api/transfers', { method: 'POST', body: JSON.stringify(transfer), headers: {'Content-Type': 'application/json'} }).catch(()=>{});

            const formData = new FormData();
            formData.append('file', file);
            formData.append('path', currentPath.value);
            try {
                const res = await apiFetch('/api/file/upload', { method: 'POST', body: formData });
                if (res.ok) {
                    fetchFiles();
                    transfer.status = 'COMPLETED';
                    transfer.progress = 100;
                } else {
                    transfer.status = 'ERROR';
                    transfer.errorMessage = '后端拒绝或网络异常';
                }
            } catch (err) { 
                transfer.status = 'ERROR';
                transfer.errorMessage = err.message || '上传失败';
            }
            transfer.timestamp = formatTime(new Date());
            apiFetch('/api/transfers', { method: 'POST', body: JSON.stringify(transfer), headers: {'Content-Type': 'application/json'} }).catch(()=>{});
        };

        const downloadFile = async (f) => {
            const id = 'h5_' + Date.now();
            const transfer = { id, name: f.name, type: 'DOWNLOAD', status: 'DOWNLOADING', progress: 0, targetPath: currentPath.value, errorMessage: '', timestamp: formatTime(new Date()) };
            transferList.value.unshift(transfer);
            apiFetch('/api/transfers', { method: 'POST', body: JSON.stringify(transfer), headers: {'Content-Type': 'application/json'} }).catch(()=>{});

            try {
                const res = await apiFetch(`/api/file/token?path=${encodeURIComponent(f.path)}`, { method: 'GET' });
                if (res.ok) {
                    const { data } = await res.json();
                    window.open(`/api/file/download?token=${data.token}`);
                    transfer.status = 'COMPLETED';
                    transfer.progress = 100;
                } else {
                    transfer.status = 'ERROR';
                    transfer.errorMessage = '获取下载令牌失败';
                }
            } catch (err) { 
                transfer.status = 'ERROR';
                transfer.errorMessage = err.message || '下载失败';
            }
            transfer.timestamp = formatTime(new Date());
            apiFetch('/api/transfers', { method: 'POST', body: JSON.stringify(transfer), headers: {'Content-Type': 'application/json'} }).catch(()=>{});
        };

        const handleBatchDelete = async () => {
            if (!confirm(`确定要批量删除这 ${selectedPaths.value.length} 个项目吗？`)) return;
            try {
                const res = await apiFetch('/api/file/bulk-delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(selectedPaths.value)
                });
                if (res.ok) {
                    selectedPaths.value = [];
                    fetchFiles();
                }
            } catch (e) { alert('批量删除失败'); }
        };

        const renameFile = async (f) => {
            const newName = prompt('重命名为:', f.name);
            if (newName && newName !== f.name) {
                try {
                    const res = await apiFetch(`/api/file/rename?oldPath=${encodeURIComponent(f.path)}&newName=${encodeURIComponent(newName)}`, { method: 'PUT' });
                    if (res.ok) fetchFiles();
                } catch (e) { alert('重命名失败'); }
            }
        };

        const confirmDelete = async (f) => {
            if (confirm(`确认永久删除 ${f.name} 吗？`)) {
                try {
                    const res = await apiFetch(`/api/file?path=${encodeURIComponent(f.path)}`, { method: 'DELETE' });
                    if (res.ok) { activeFile.value = null; fetchFiles(); }
                } catch (e) { alert('删除失败'); }
            }
        };

        onMounted(() => {
            // [PHYSICAL FIX] 混合架构对齐：如果处于原生容器环境且本地无 Token，则自动从原生 Bridge 同步状态
            if (!isWebLoggedIn.value && window.AndroidBridge) {
                const nativeToken = window.AndroidBridge.getToken();
                const nativeKey = window.AndroidBridge.getSessionKey();
                if (nativeToken) {
                    localStorage.setItem('visit_token', nativeToken);
                    if (nativeKey) localStorage.setItem('visit_session_key', nativeKey);
                    isWebLoggedIn.value = true;
                }
            }
            
            refreshIcons();
            if (isWebLoggedIn.value) {
                if (isSshLoggedIn.value) handleSshLogin();
                fetchBookmarks();
            }
        });

        watch(currentTab, (v) => {
            if (v === 'terminal') nextTick(() => fitAddon?.fit());
            if (v === 'audit') fetchAuditLogs();
            refreshIcons();
        });

        return {
            isWebLoggedIn, webPwd, isSshLoggedIn, sshHost, sshPort, sshUser, sshPwd, loading, 
            currentTab, terminalEl, coreShortcuts, currentPath, fileList, transferList, activeFile, monitor,
            editingFile, saving, focusTerminal, syncPathToTerm, jumpToPath, inputPath,
            handleWebLogin, handleSshLogin, handleLogout, sendKey: (v) => socket?.send(v), 
            handleFileClick, goUp, formatSize, isEditable, openEditor, saveFile, 
            closeEditor: () => (editingFile.value = null, refreshIcons()),
            auditLogs, getAuditTagClass, openMenu: (f) => (activeFile.value = f, refreshIcons()),
            uploadFile, downloadFile, renameFile, confirmDelete, clearTransfers,
            showConnectionForm,
            selectedPaths, isKeyAuth, bookmarks, shouldSaveBookmark, bookmarkName, isWsDisconnected,
            useBookmark, deleteBookmark, snippets, executeSnippet, syncTermToFiles, syncFilesToTerm, handleBatchDelete
        }
    }
}).mount('#app');
</script>
</body>
</html>
