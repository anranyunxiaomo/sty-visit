server:
  port: 8080
  error:
    include-stacktrace: never   # 禁止泄露敏感后端堆栈信息
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

spring:
  main:
    banner-mode: off            # 关闭 Banner 隐藏框架指纹

# 天穹 配置
styvisit:
  # Web 访问密码（第一层屏障）
  # 加固：支持环境变量注入 (ADMIN_PWD)，默认为安全审计要求的强密码
  admin-password: ${ADMIN_PWD:StyVisit@2026}
  # JWT 秘钥
  # 加固：支持环境变量注入 (JWT_SECRET)，增强生产环境密钥隔离性
  jwt-secret: ${JWT_SECRET:StyVisit_SecretKey_2026!#Secure}
  
  # 审计日志保留天数
  audit:
    retention-days: 31
  
  # SSH 核心桥接与池化配置
  ssh-host: 127.0.0.1
  ssh-port: 22
  ssh:
    connect-timeout: 5000
    execute-timeout: 10000
    max-idle-time: 1800000
    check-interval: 60000
  
  # 资源限制
  max-sessions: 50
  
  # SSH 安全加固 (可选): 配置已知主机指纹文件路径，开启严苛指纹校验 (对应 StrictHostKeyChecking=yes)
  # ssh-known-hosts: /etc/ssh/ssh_known_hosts
