# ===================================================================
# 天穹 生产环境配置模板 (v1.0)
# ===================================================================
server:
  port: 8080 # 默认访问端口
  servlet:
    multipart:
      max-file-size: 100MB  # 最大允许上传的文件大小
      max-request-size: 100MB

# 业务核心安全性配置
styvisit:
  # 管理面板登录密码 (首道防线)
  admin-password: "StyVisit@2026"

  # 配置和数据存储目录 (默认为 config)
  # 说明: 
  # 1. 如果填入相对路径 (如 "config" 或 "./config")，将会在当前启动命令执行的同级目录下生成。
  # 2. 如果需要进行程序与数据分离，也可以配置为服务器的绝对路径 (如 "/var/data/styvisit-config")。
  config-dir: "config"

  # JWT 会话签名密钥 (长度需 > 24位)
  jwt-secret: "StyVisit_SecureKey_@2026!#Secure_Production"
  
  # SSH 隧道目标配置 (通常保持 127.0.0.1 即可，由面板代理访问本机)
  ssh-host: 127.0.0.1
  ssh-port: 22
  ssh-strict-host-key-check: "no" # 是否开启严格主机密钥检查
  
  # 后端资源限制
  max-sessions: 50 # 允许同时在线的最大 SSH 会话数
  audit-retention-days: 7 # 审计日志物理保留天数

# 日志配置
logging:
  level:
    root: INFO
    com.sty.visit: INFO
  file:
    name: logs/sty-visit.log
